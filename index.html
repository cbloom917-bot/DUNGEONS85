<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeons '85</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<style>
    * { box-sizing: border-box; font-family: monospace; }
    body { background-color: #000; color: #fff; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; width: 100vw; -webkit-user-select: none; user-select: none; }

    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .hidden { display: none !important; }

    #top-nav { position: fixed; top: 0; left: 0; width: 100%; height: 60px; display: flex; align-items: center; justify-content: center; gap: 4rem; background-color: #000; z-index: 1000; }
    .nav-link { color: #666; text-decoration: none; text-transform: uppercase; font-weight: bold; font-size: 1.1rem; letter-spacing: 0.1em; padding: 4px 10px; transition: color 0.2s ease; }
    .nav-link:hover, .nav-link.active { background-color: transparent; color: #fff; }
    
    #login-screen { 
        position: fixed; top: 60px; bottom: 0; left: 0; right: 0; 
        background-color: #000; 
        background-image: url('assets/background.png');
        background-repeat: no-repeat;
        background-position: top center;
        background-size: 100% auto; 
        z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; border: none; margin: 0; 
    }
    
    .login-center-stack { width: 100%; max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
    .logo-container { width: 100%; max-width: 400px; margin: 0 auto 1.5rem auto; text-align: center; }
    .logo-container img { width: 100%; height: auto; object-fit: contain; }
    
    .login-wrap { text-align: center; width: 100%; border: none; }
    .login-title { font-size: 1.75rem; font-weight: bold; border: none; padding-bottom: 0.5rem; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .bw-input { width: 100%; background-color: #000; border: 2px solid #fff; color: #fff; padding: 0.75rem; text-align: center; font-size: 1rem; outline: none; text-transform: uppercase; margin-bottom: 1rem; }
    .bw-input:focus { background-color: #fff; color: #000; }
    .toggle-container { display: flex; border: 2px solid #fff; margin-bottom: 1rem; }
    .toggle-btn { flex: 1; background: #000; color: #fff; border: none; padding: 0.5rem; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    .toggle-btn.active { background: #fff; color: #000; }
    .bw-btn { width: 100%; background-color: #fff; color: #000; font-weight: bold; padding: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; border: 2px solid #fff; cursor: pointer; font-size: 1rem; }
    .bw-btn:hover { background-color: #000; color: #fff; }

    #vtt-interface { position: fixed; inset: 0; display: flex; flex-direction: column; overflow: hidden; z-index: 10; }
    canvas { touch-action: none; -webkit-user-select: none; user-select: none; }
    #vtt-canvas { flex: 1; min-height: 0; position: relative; width: 100%; background-color: #000; cursor: grab; display: block; }
    #vtt-canvas.plotting { cursor: crosshair !important; }
    
    .toolbar { position: absolute; background: #000; border: 2px solid #fff; padding: 0.5rem; display: flex; flex-direction: column; gap: 0.35rem; z-index: 10; }
    #toolbar-left { top: 4rem; left: 1rem; box-shadow: 4px 4px 0px 0px #fff; width: 110px; }
    #toolbar-right { top: 4rem; right: 1rem; box-shadow: 4px 4px 0px 0px #fff; width: 180px; }
    
    .panel-label { font-size: 10px; text-align: center; border-bottom: 1px solid #fff; padding-bottom: 2px; text-transform: uppercase; color: #888; letter-spacing: 0.05em; cursor: move; padding-top: 2px; background: #111; margin: -0.5rem -0.5rem 0.2rem -0.5rem; }
    .panel-label:active { background: #fff; color: #000; }
    
    .tool-btn { background: #000; color: #fff; border: 1px solid #fff; padding: 0.25rem; font-size: 11px; text-transform: uppercase; cursor: pointer; font-weight: bold; width: 100%; text-align: center; display: block; margin-bottom: 4px; transition: all 0.2s ease; }
    .tool-btn:hover { background: #fff; color: #000; }
    .grid-dice { display: grid; grid-template-columns: 1fr 1fr; gap: 0.25rem; }

    #ctx-menu { position: absolute; display: none; background: #000; border: 2px solid #fff; box-shadow: 4px 4px 0px 0px #fff; padding: 2px; z-index: 100; min-width: 150px; }
    .ctx-item { background: #000; color: #fff; border: none; padding: 6px 8px; font-size: 11px; font-weight: bold; text-transform: uppercase; text-align: left; width: 100%; display: block; cursor: pointer; }
    .ctx-item:hover { background: #fff; color: #000; }
    
    #torch-panel { top: 4rem; right: 14rem; width: 240px; box-shadow: 4px 4px 0px 0px #fff; z-index: 60; }
    #turn-tracker-panel { top: 9rem; right: 14rem; width: 300px; box-shadow: 4px 4px 0px 0px #fff; z-index: 60; }
    #fog-panel { top: 18.5rem; right: 14rem; width: 180px; box-shadow: 4px 4px 0px 0px #fff; z-index: 60; }

    .torch-controls { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-top: 10px; }
    .torch-status { font-size: 14px; font-weight: bold; padding: 2px 6px; color: #666; cursor: pointer; text-transform: uppercase; transition: color 0.2s ease; }
    .torch-status:hover { color: #aaa; }
    .torch-status.active { color: #fff; background: transparent; cursor: default; }
    #torch-clock { font-size: 1.5rem; font-weight: bold; color: #fff; letter-spacing: 0.05em; text-align: center; flex: 1; }

    .tracker-wrapper { display: flex; align-items: flex-end; justify-content: center; gap: 0; margin-top: 15px; margin-bottom: 5px; }
    .turn-col { display: flex; flex-direction: column; align-items: center; position: relative; }
    .turn-lbl { font-size: 11px; font-weight: bold; height: 16px; text-transform: uppercase; color: #ccc; }
    .turn-box { width: 32px; height: 32px; border: 2px solid #fff; border-right: none; background: #000; cursor: pointer; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 20px; }
    .turn-col:last-of-type .turn-box { border-right: 2px solid #fff; }
    .turn-box.checked::after { content: 'X'; color: #fff; }
    .turn-reset-btn { background: transparent; border: none; color: #fff; font-size: 22px; cursor: pointer; margin-left: 14px; padding-bottom: 4px; font-weight: bold; }
    .turn-reset-btn:hover { color: #888; }
    #turn-message { margin-top: 10px; font-size: 10px; text-align: center; color: #fff; text-transform: uppercase; min-height: 40px; line-height: 1.4; font-weight: bold; }

    .dice-history-ticker { width: 100%; height: 35px; background: #000; border-top: 2px solid #fff; display: flex; align-items: center; justify-content: flex-start; padding: 0 1rem; font-size: 12px; font-weight: bold; overflow-x: auto; white-space: nowrap; gap: 1.5rem; z-index: 20; }
    .ticker-entry { color: #fff; text-transform: uppercase; border-right: 1px dashed #333; padding-right: 1.5rem; display: inline-block; }
    .ticker-entry span { color: #888; margin-right: 4px; }

    .video-ribbon { width: 100%; background: #000; border-top: 2px solid #fff; padding: 0.5rem; display: flex; gap: 0.5rem; overflow-x: auto; height: 140px; align-items: center; justify-content: center; z-index: 20; }
    .video-box { position: relative; height: 110px; aspect-ratio: 16/9; background: #111; border: 1px solid #fff; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 0; }
    .video-box video { aspect-ratio: 16 / 9; width: 100%; height: 100%; object-fit: contain; background: #111; transform: scaleX(-1); -webkit-transform: scaleX(-1); -moz-transform: scaleX(-1); }
    .video-label { position: absolute; bottom: 4px; left: 4px; background: #000; color: #fff; font-size: 10px; padding: 2px 4px; border: 1px solid #fff; text-transform: uppercase; z-index: 5; }
    .video-controls-overlay { position: absolute; top: 4px; right: 4px; display: flex; gap: 2px; z-index: 5; opacity: 0.4; transition: opacity 0.2s ease; }
    .video-box:hover .video-controls-overlay { opacity: 1; }
    .media-toggle-btn { background: #000; color: #fff; border: 1px solid #fff; font-size: 8px; font-weight: bold; padding: 2px 4px; cursor: pointer; text-transform: uppercase; }
    .media-toggle-btn.muted-state { background: #ff3333; color: #fff; border-color: #ff3333; }
    .hardware-fail-alert { text-align: center; color: #666; font-size: 9px; padding: 10px; text-transform: uppercase; line-height: 1.3; font-weight: bold; }

    .dice-container-overlay { position: absolute; width: 120px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; pointer-events: none; z-index: 40; text-align: center; transition: opacity 0.5s ease-in-out; }
    .dice-sprite-frame { width: 100px; height: 100px; background-repeat: no-repeat; background-size: 700px 100px; background-position: 0px 0px; display: flex; align-items: center; justify-content: center; position: relative; }
    .dice-numerical-overlay { font-size: 24px; font-weight: bold; color: #fff; text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000; display: none; z-index: 2; }
    .dice-player-label { margin-top: 4px; background-color: #000; color: #fff; border: 1px solid #fff; font-size: 11px; padding: 2px 6px; text-transform: uppercase; letter-spacing: 0.05em; box-shadow: 2px 2px 0px 0px #fff; white-space: nowrap; }
    
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #fff; }
</style>
</head>

<nav id="top-nav">
    <a href="index.html" class="nav-link active">PLAY</a>
    <a href="merch.html" class="nav-link">MERCH</a>
    <a href="faq.html" class="nav-link">FAQ</a>
    <a href="privacy.html" class="nav-link">PRIVACY</a>
    <a href="tos.html" class="nav-link">TOS</a>
    <a href="contact.html" class="nav-link">CONTACT</a>
</nav>

<div id="login-screen">
    <div class="login-center-stack">
        <div class="logo-container">
            <img src="assets/dungeons85logo.svg" alt="Dungeons '85 Logo">
        </div>
        <div class="login-wrap">
            <div class="login-title">VERSION 7.6.1</div>
            <div class="toggle-container">
                <button type="button" id="role-player" class="toggle-btn active" onclick="setRoleSelection(false); document.getElementById('room-id-input').value = '';">PLAYER (JOIN)</button>
                <button type="button" id="role-dm" class="toggle-btn" onclick="setRoleSelection(true); generateRandomRoomName();">GM (HOST)</button>
            </div>
            <input type="text" id="char-name-input" placeholder="Character Name" class="bw-input" maxlength="20">
            <input type="text" id="room-id-input" placeholder="Room Name" class="bw-input" maxlength="20">
            <button id="join-btn" class="bw-btn">CREATE/JOIN TABLE</button>
        </div>
    </div>
</div>

<div id="vtt-interface" class="hidden">
    <canvas id="vtt-canvas"></canvas>
    
    <div id="ctx-menu">
        <button class="ctx-item" onclick="executeContextReveal()">Reveal/Hide</button>
        <button class="ctx-item" onclick="executeContextDuplicate()">Duplicate</button>
        <hr style="border: 0; border-top: 1px solid #222; margin: 4px 0;">
        <button class="ctx-item" onclick="executeContextResize(100)">Size: Med/Small (1x1)</button>
        <button class="ctx-item" onclick="executeContextResize(200)">Size: Large (2x2)</button>
        <button class="ctx-item" onclick="executeContextResize(300)">Size: Huge (3x3)</button>
        <button class="ctx-item" onclick="executeContextResize(400)">Size: Gargantuan (4x4)</button>
        <hr style="border: 0; border-top: 1px solid #222; margin: 4px 0;">
        <button class="ctx-item" onclick="executeContextDelete()" style="color: #ff3333;">Dead</button>
    </div>

    <div class="toolbar" id="toolbar-left">
        <div class="panel-label">:: Dice ::</div>
        <div class="grid-dice">
            <button onclick="rollDice(4)" class="tool-btn">D4</button>
            <button onclick="rollDice(6)" class="tool-btn">D6</button>
            <button onclick="rollDice(8)" class="tool-btn">D8</button>
            <button onclick="rollDice(10)" class="tool-btn">D10</button>
            <button onclick="rollDice(12)" class="tool-btn">D12</button>
            <button onclick="rollDice(20)" class="tool-btn">D20</button>
        </div>
    </div>

    <div class="toolbar" id="toolbar-right">
        <div class="panel-label">:: Tools ::</div>
        <button onclick="openCloudVault('MAP')" class="tool-btn">Load Map</button>
        <button onclick="openCloudVault('TOKEN')" class="tool-btn">Spawn Token</button>
        <button onclick="toggleTorchPanel()" class="tool-btn">Torch Timer</button>
        <button onclick="toggleTurnTracker()" class="tool-btn">Turn Tracker</button>
        <button onclick="toggleFogPanel()" class="tool-btn">Fog of War</button>
        <button onclick="forcePlayerFocus()" class="tool-btn">Focus View</button>
        <div style="border-top: 1px dashed #444; margin: 4px 0;"></div>
        <label class="tool-btn" style="cursor: pointer;">
            Import JSON
            <input type="file" accept=".json" style="display: none;" onchange="importAdventureJson(event)">
        </label>
        <button onclick="exportTableState()" class="tool-btn">Export JSON</button>
        <div style="font-size: 9px; text-align: center; text-transform: uppercase; color: #fff; background: #222; padding: 4px;" id="room-display">Room: ---</div>
    </div>

    <div class="toolbar hidden" id="fog-panel">
        <div class="panel-label">:: Fog Of War ::</div>
        <button onclick="toggleFogMode()" id="btn-fog-toggle" class="tool-btn">Enable Fog</button>
        <button onclick="toggleFogDraw()" id="btn-fog-draw" class="tool-btn" style="display:none;">PLOT REVEAL</button>
        <button onclick="resetFog()" id="btn-fog-reset" class="tool-btn" style="display:none; color: #ff3333;">Reset Fog</button>
    </div>

    <div class="toolbar hidden" id="torch-panel">
        <div class="panel-label">:: Torch ::</div>
        <div class="torch-controls">
            <div id="torch-light-btn" class="torch-status" onclick="igniteTorch()">LIGHT</div>
            <div id="torch-clock">00:00</div>
            <div id="torch-dark-status" class="torch-status active" onclick="torchSeconds = 0; extinguishTorch()">DARK</div>
        </div>
    </div>

    <div class="toolbar hidden" id="turn-tracker-panel">
        <div class="panel-label">:: Turn Tracker ::</div>
        <div class="tracker-wrapper">
            <div class="turn-col"><div class="turn-lbl"></div><div class="turn-box" id="turn-box-1" onclick="checkTurn(1)"></div></div>
            <div class="turn-col"><div class="turn-lbl">W</div><div class="turn-box" id="turn-box-2" onclick="checkTurn(2)"></div></div>
            <div class="turn-col"><div class="turn-lbl"></div><div class="turn-box" id="turn-box-3" onclick="checkTurn(3)"></div></div>
            <div class="turn-col"><div class="turn-lbl">W</div><div class="turn-box" id="turn-box-4" onclick="checkTurn(4)"></div></div>
            <div class="turn-col"><div class="turn-lbl"></div><div class="turn-box" id="turn-box-5" onclick="checkTurn(5)"></div></div>
            <div class="turn-col"><div class="turn-lbl">WR</div><div class="turn-box" id="turn-box-6" onclick="checkTurn(6)"></div><div style="position: absolute; right: -12px; bottom: 8px; font-size: 12px; font-weight: bold;">T</div></div>
            <button class="turn-reset-btn" onclick="resetTurns()">&#x21BA;</button> 
        </div>
        <div id="turn-message"></div>
    </div>

    <div id="ticker-log" class="dice-history-ticker">
        <div class="ticker-entry" id="ticker-empty-msg" style="color: #444; border: none;">[ Log Empty ]</div>
    </div>

    <div class="video-ribbon">
        <div class="video-box" id="local-video-container">
            <video id="local-video" autoplay muted playsinline></video>
            <div id="local-name" class="video-label">You</div>
            <div class="video-controls-overlay">
                <button id="toggle-mic-btn" class="media-toggle-btn" onclick="toggleLocalAudio()">Mute</button>
                <button id="toggle-cam-btn" class="media-toggle-btn" onclick="toggleLocalVideo()">Cam Off</button>
            </div>
        </div>
        <div id="peer-videos-container" class="flex" style="gap: 0.5rem;"></div>
    </div>
</div>

<script>
    let pickerApiLoaded = false;
    let currentPickerMode = null; 

    const adjectives = ["Gravel", "Iron", "Obsidian", "Silent", "Bitter", "Deep", "Lost", "Fallen", "Corpse", "Broken"];
    const nouns = ["Crypt", "Spawning", "Vault", "Temple", "Bloom", "Pit", "Crawl", "Keep", "Void", "Borg"];
    
    function generateRandomRoomName() {
        if (!tableState.isDM) return;
        const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
        const noun = nouns[Math.floor(Math.random() * nouns.length)];
        const num = Math.floor(100 + Math.random() * 900);
        document.getElementById('room-id-input').value = `${adj}${noun}${num}`.toUpperCase();
    }
    
    function loadGooglePickerLibraries() { 
        gapi.load('picker', { 'callback': () => { pickerApiLoaded = true; } }); 
    }
    window.addEventListener('DOMContentLoaded', loadGooglePickerLibraries);
    
    function openCloudVault(mode) {
        if (!tableState.isDM) return;
        currentPickerMode = mode;
        const tokenClient = window.google.accounts.oauth2.initTokenClient({
            client_id: "614025216557-rumtlu22kcsm5aka053t7p5p84826qt4.apps.googleusercontent.com", 
            scope: "https://www.googleapis.com/auth/drive.file",
            callback: (tokenResponse) => { 
                if (tokenResponse && tokenResponse.access_token) { 
                    createPickerInstance(tokenResponse.access_token); 
                } 
            },
        });
        tokenClient.requestAccessToken();
    }
    
    function createPickerInstance(token) {
        if (!pickerApiLoaded) return;
        const view = new google.picker.DocsView(google.picker.ViewId.DOCS);
        view.setIncludeFolders(true); 
        view.setMimeTypes("image/png,image/jpeg,image/webp,image/svg+xml");
        
        new google.picker.PickerBuilder()
            .addView(view)
            .setOAuthToken(token)
            .setAppId("614025216557")
            .setDeveloperKey("AIzaSyD504HDTxz2X9I_4syVoE1ogGhlNBcL928")
            .setCallback(handlePickerSelection)
            .setTitle(currentPickerMode === 'MAP' ? "Select Map" : "Select Token")
            .build()
            .setVisible(true);
    }
    
    function handlePickerSelection(data) {
        if (data[google.picker.Response.ACTION] === google.picker.Action.PICKED) {
            const doc = data[google.picker.Response.DOCUMENTS][0];
            const fileId = doc[google.picker.Document.ID];
            const publicDirectUrl = `https://drive.google.com/uc?export=view&id=${fileId}`;
            
            if (currentPickerMode === 'MAP') {
                tableState.mapSrc = publicDirectUrl; 
                socket.emit('updateMapImage', publicDirectUrl); 
                loadCloudImage(publicDirectUrl).then(() => draw());
            } else if (currentPickerMode === 'TOKEN') {
                const newToken = { 
                    id: "token-" + Date.now() + Math.random(), 
                    src: publicDirectUrl, 
                    x: (canvas.width / 2 - tableState.camera.x) / tableState.camera.zoom, 
                    y: (canvas.height / 2 - tableState.camera.y) / tableState.camera.zoom, 
                    size: 100, 
                    hidden: true 
                };
                tableState.tokens.push(newToken); 
                loadCloudImage(publicDirectUrl).then(() => draw()); 
                broadcastTokensMatrixChange();
            }
        }
    }
    
    let tableState = { 
        playerName: '', 
        isDM: false, 
        mapSrc: null, 
        tokens: [], 
        camera: { x: 0, y: 0, zoom: 1 }, 
        fowEnabled: false, 
        fowPolygons: [], 
        isDarknessActive: false 
    };
    
    let isDrawingFoW = false;
    let currentFoWPolygon = [];
    let currentMouseWorldX = 0;
    let currentMouseWorldY = 0;
    
    let tokenImageCache = {};
    let socket = null;
    let peer = null;
    let localStream = null;
    let currentActiveRoomArray = [];
    
    const canvas = document.getElementById('vtt-canvas');
    const ctx = canvas.getContext('2d');
    const ctxMenu = document.getElementById('ctx-menu');
    const fogCanvas = document.createElement('canvas');
    const fogCtx = fogCanvas.getContext('2d');
    let contextSelectedToken = null;
    
    window.addEventListener('DOMContentLoaded', () => { 
        window.addEventListener('click', () => { ctxMenu.style.display = 'none'; }); 
        window.addEventListener('beforeunload', () => { if (socket) { socket.emit('disconnect'); socket.disconnect(); } }); 
    });
    
    async function loadCloudImage(src) {
        if (!src) return Promise.resolve(null);
        if (tokenImageCache[src]) return Promise.resolve(tokenImageCache[src]);
        
        return new Promise((resolve) => {
            const img = new Image(); 
            img.crossOrigin = "Anonymous"; 
            img.src = src; 
            img.onload = () => { 
                tokenImageCache[src] = img; 
                resolve(img); 
            };
            img.onerror = () => { resolve(null); };
        });
    }
    
    function setRoleSelection(isDMSelection) { 
        tableState.isDM = isDMSelection; 
        document.getElementById('role-dm').classList.toggle('active', isDMSelection); 
        document.getElementById('role-player').classList.toggle('active', !isDMSelection); 
    }
    
    function resizeCanvas() { 
        canvas.width = canvas.clientWidth; 
        canvas.height = canvas.clientHeight; 
        fogCanvas.width = canvas.width; 
        fogCanvas.height = canvas.height; 
        draw(); 
    }
    window.addEventListener('resize', resizeCanvas);
    
    document.getElementById('join-btn').addEventListener('click', () => {
        const nameInput = document.getElementById('char-name-input').value.trim();
        const roomInput = document.getElementById('room-id-input').value.trim().toUpperCase();
        if (!nameInput || !roomInput) return alert("Please enter both a Character Name and a Room Name.");
        tableState.playerName = nameInput; 
        setupCameraAndVideo().then(() => { 
            initHybridMediaVttStack(roomInput, nameInput); 
        });
    });
    
    function forcePlayerFocus() { 
        if (!tableState.isDM || !socket) return; 
        socket.emit('forceCamera', tableState.camera); 
    }
    
    function toggleLocalAudio() { 
        if (!localStream) return; 
        const track = localStream.getAudioTracks()[0]; 
        if (track) { 
            track.enabled = !track.enabled; 
            const btn = document.getElementById('toggle-mic-btn'); 
            btn.innerText = track.enabled ? "Mute" : "Unmute"; 
            btn.classList.toggle('muted-state', !track.enabled); 
        } 
    }
    
    function toggleLocalVideo() { 
        if (!localStream) return; 
        const track = localStream.getVideoTracks()[0]; 
        if (track) { 
            track.enabled = !track.enabled; 
            const btn = document.getElementById('toggle-cam-btn'); 
            btn.innerText = track.enabled ? "Cam Off" : "Cam On"; 
            btn.classList.toggle('muted-state', !track.enabled); 
        } 
    }
    
    function initHybridMediaVttStack(roomName, playerName) {
        if (socket) socket.disconnect();
        
        peer = new Peer(undefined, { config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } });
        
        peer.on('open', (peerId) => {
            socket = io("https://newvtt.onrender.com", { transports: ["websocket"] });
            
            socket.on('connect', () => {
                document.getElementById('room-display').innerText = `Room: ${roomName}`; 
                document.getElementById('top-nav').classList.add('hidden'); 
                document.getElementById('login-screen').classList.add('hidden'); 
                document.getElementById('vtt-interface').classList.remove('hidden');
                
                setTimeout(() => { resizeCanvas(); makeElementsDraggable(); }, 50);
                socket.emit('joinRoom', { roomName, playerName, isDM: tableState.isDM, peerId });
            });
            
            socket.on('syncMap', (mapSrc) => { 
                tableState.mapSrc = mapSrc; 
                loadCloudImage(mapSrc).then(() => draw()); 
            });
            
            socket.on('syncTokens', (incomingTokens) => { 
                tableState.tokens = incomingTokens; 
                incomingTokens.forEach(t => loadCloudImage(t.src).then(() => draw())); 
                draw(); 
            });
            
            socket.on('tokenMoved', (data) => { 
                const match = tableState.tokens.find(t => t.id === data.id); 
                if (match) { match.x = data.x; match.y = data.y; draw(); } 
            });
            
            socket.on('diceRolledAnimation', (data) => { executeDiceOverlayAnimation(data.sides, data.result, data.player, data.screenX, data.screenY); });
            socket.on('syncCamera', (cameraData) => { if (tableState.isDM) return; tableState.camera = cameraData; draw(); });
            socket.on('syncFoW', (fowData) => { tableState.fowEnabled = fowData.enabled; tableState.fowPolygons = fowData.polygons; tableState.isDarknessActive = fowData.darkness; draw(); });
        });
    }
    
    function toggleFogPanel() { if (tableState.isDM) document.getElementById('fog-panel').classList.toggle('hidden'); }
    function broadcastFoW() { if (tableState.isDM && socket) socket.emit('updateFoW', { enabled: tableState.fowEnabled, polygons: tableState.fowPolygons, darkness: tableState.isDarknessActive }); }
    function toggleFogMode() { if (!tableState.isDM) return; tableState.fowEnabled = !tableState.fowEnabled; updateFogUI(); broadcastFoW(); draw(); }
    function toggleFogDraw() { if (!tableState.isDM || !tableState.fowEnabled) return; isDrawingFoW = !isDrawingFoW; updateFogUI(); draw(); }
    function resetFog() { if (!tableState.isDM) return; tableState.fowPolygons = []; isDrawingFoW = false; updateFogUI(); broadcastFoW(); draw(); }

    function updateFogUI() {
        const btnToggle = document.getElementById('btn-fog-toggle');
        const btnDraw = document.getElementById('btn-fog-draw');
        const btnReset = document.getElementById('btn-fog-reset');
        if (!btnToggle) return;
        btnToggle.innerText = tableState.fowEnabled ? "Disable Fog" : "Enable Fog"; 
        btnDraw.style.display = tableState.fowEnabled ? "block" : "none"; 
        btnReset.style.display = tableState.fowEnabled ? "block" : "none";
        document.getElementById('vtt-canvas').classList.toggle('plotting', isDrawingFoW);
    }
    
    function broadcastTokensMatrixChange() { if (tableState.isDM && socket) socket.emit('updateTokensMatrix', tableState.tokens); }
    
    function importAdventureJson(event) {
        const file = event.target.files[0]; 
        const reader = new FileReader(); 
        reader.onload = function(e) { 
            const json = JSON.parse(e.target.result); 
            tableState.tokens = json.tokens || []; 
            tableState.mapSrc = json.savedMapSrc || null; 
            if (tableState.mapSrc) loadCloudImage(tableState.mapSrc).then(() => draw()); 
            tableState.tokens.forEach(t => loadCloudImage(t.src).then(() => draw())); 
            draw(); 
        }; 
        reader.readAsText(file);
    }
    
    function exportTableState() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(tableState));
        const downloadAnchor = document.createElement('a'); 
        downloadAnchor.setAttribute("href", dataStr); 
        downloadAnchor.setAttribute("download", "vtt-table-state.json"); 
        document.body.appendChild(downloadAnchor); 
        downloadAnchor.click(); 
        downloadAnchor.remove();
    }
    
    let isDraggingWorkspace = false, dragStart = { x: 0, y: 0 }, selectedToken = null;
    
    canvas.addEventListener('contextmenu', (e) => {
        if (!tableState.isDM) return; 
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const worldX = (e.clientX - rect.left - tableState.camera.x) / tableState.camera.zoom;
        const worldY = (e.clientY - rect.top - tableState.camera.y) / tableState.camera.zoom;
        contextSelectedToken = tableState.tokens.find(t => Math.hypot(t.x - worldX, t.y - worldY) < t.size / 2);
        if (contextSelectedToken) { ctxMenu.style.left = `${e.clientX}px`; ctxMenu.style.top = `${e.clientY}px`; ctxMenu.style.display = 'block'; }
    });
    
    canvas.addEventListener('mousedown', (e) => {
        if (e.button === 2) return; 
        ctxMenu.style.display = 'none'; 
        const rect = canvas.getBoundingClientRect();
        const worldX = (e.clientX - rect.left - tableState.camera.x) / tableState.camera.zoom;
        const worldY = (e.clientY - rect.top - tableState.camera.y) / tableState.camera.zoom;
        if (tableState.isDM && isDrawingFoW) { currentFoWPolygon.push({x: worldX, y: worldY}); draw(); return; }
        selectedToken = tableState.tokens.slice().reverse().find(t => Math.hypot(t.x - worldX, t.y - worldY) < t.size / 2);
        isDraggingWorkspace = !selectedToken; 
        dragStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    });
    
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left, mouseY = e.clientY - rect.top;
        if (!isDraggingWorkspace && !selectedToken) return;
        const dx = (mouseX - dragStart.x) / tableState.camera.zoom, dy = (mouseY - dragStart.y) / tableState.camera.zoom;
        if (selectedToken) { selectedToken.x += dx; selectedToken.y += dy; socket.emit('tokenMove', { id: selectedToken.id, x: selectedToken.x, y: selectedToken.y }); } 
        else if (isDraggingWorkspace) { tableState.camera.x += (mouseX - dragStart.x); tableState.camera.y += (mouseY - dragStart.y); }
        dragStart = { x: mouseX, y: mouseY }; draw();
    });
    
    window.addEventListener('mouseup', () => { if (isDraggingWorkspace && selectedToken) broadcastTokensMatrixChange(); isDraggingWorkspace = false; selectedToken = null; });
    canvas.addEventListener('wheel', (e) => { e.preventDefault(); tableState.camera.zoom *= (e.deltaY < 0 ? 1.1 : 1 / 1.1); draw(); });
    
    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height); 
        ctx.save(); ctx.translate(tableState.camera.x, tableState.camera.y); ctx.scale(tableState.camera.zoom, tableState.camera.zoom);
        let mapImg = tokenImageCache[tableState.mapSrc];
        if (mapImg && mapImg.complete) ctx.drawImage(mapImg, -mapImg.width / 2, -mapImg.height / 2);
        for (let t of tableState.tokens) { 
            let img = tokenImageCache[t.src]; 
            if (img && img.complete) ctx.drawImage(img, t.x - t.size / 2, t.y - t.size / 2, t.size, t.size); 
        }
        ctx.restore(); 
    }
    
    function rollDice(sides) { socket.emit('executeDiceRoll', { sides, result: Math.floor(Math.random() * sides) + 1, player: tableState.playerName }); }
    function executeDiceOverlayAnimation(sides, result, rollerName) { addResultToHistoryTicker(rollerName, sides, result); }
    function addResultToHistoryTicker(player, sides, result) { 
        const ticker = document.getElementById('ticker-log'); 
        const entry = document.createElement('div'); entry.className = 'ticker-entry'; 
        entry.innerHTML = `<span>[${new Date().toLocaleTimeString()}]</span> ${player} ROLLED D${sides}: ${result}`; 
        ticker.appendChild(entry); ticker.scrollLeft = ticker.scrollWidth; 
    }
    
    function toggleTorchPanel() { document.getElementById('torch-panel').classList.toggle('hidden'); }
    function toggleTurnTracker() { document.getElementById('turn-tracker-panel').classList.toggle('hidden'); }
    function checkTurn(n) { document.getElementById(`turn-box-${n}`).classList.toggle('checked'); }
    function resetTurns() { for(let i=1; i<=6; i++) document.getElementById(`turn-box-${i}`).classList.remove('checked'); }

    async function setupCameraAndVideo() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream; 
        } catch (err) { console.error("Hardware Access Failed"); }
    }
    
    function makeElementsDraggable() {
        document.querySelectorAll('.toolbar').forEach(toolbar => {
            const handle = toolbar.querySelector('.panel-label'); 
            handle.onmousedown = (e) => { 
                let x = e.clientX, y = e.clientY;
                document.onmousemove = (ev) => { 
                    toolbar.style.top = (toolbar.offsetTop - (y - ev.clientY)) + "px"; 
                    toolbar.style.left = (toolbar.offsetLeft - (x - ev.clientX)) + "px"; 
                    x = ev.clientX; y = ev.clientY;
                }; 
                document.onmouseup = () => { document.onmousemove = null; }; 
            };
        });
    }
    
    draw();
</script>
</body>
</html>
