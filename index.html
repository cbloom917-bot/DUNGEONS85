<!DOCTYPE html>
<html lang="en">

<head>
    <base href="https://dungeons85.com/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeons '85</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script src="config.js"></script>

<link rel="icon" type="image/x-icon" href="assets/favicon.ico">

<style>
    #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: #fff; font-family: monospace; }
    .spinner { width: 50px; height: 50px; border: 4px solid #fff; border-top: 4px solid #000; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

* { box-sizing: border-box; font-family: monospace; }
body { background-color: #000; color: #fff; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; height: 100vh; width: 100vw; -webkit-user-select: none; user-select: none; }


    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .hidden { display: none !important; }


    #top-nav { position: fixed; top: 0; left: 0; width: 100%; height: 60px; display: flex; align-items: center; justify-content: center; gap: 4rem; background-color: #000; z-index: 1000; }
    .nav-link { color: #666; text-decoration: none; text-transform: uppercase; font-weight: bold; font-size: 1.1rem; letter-spacing: 0.1em; padding: 4px 10px; transition: color 0.2s ease; }
    .nav-link:hover, .nav-link.active { background-color: transparent; color: #fff; }


    #login-screen { 
        position: fixed; top: 60px; bottom: 0; left: 0; right: 0; 
        background-color: #000; 
        background-image: url('assets/background.png');
        background-repeat: no-repeat;
        background-position: top center;
        background-size: 100% 80vh;
        z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; border: none; margin: 0; 
    }


    .login-wrap { text-align: center; max-width: 400px; width: 100%; margin: 0 auto; border: none; }
    .login-title { font-size: 1.75rem; font-weight: bold; border: none; padding-bottom: 0.5rem; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .bw-input { width: 100%; background-color: #000; border: 2px solid #fff; color: #fff; padding: 0.75rem; text-align: center; font-size: 1rem; outline: none; text-transform: uppercase; margin-bottom: 1rem; }
    .bw-input:focus { background-color: #fff; color: #000; }
    .toggle-container { display: flex; border: 2px solid #fff; margin-bottom: 1rem; }
    .toggle-btn { flex: 1; background: #000; color: #fff; border: none; padding: 0.5rem; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    .toggle-btn.active { background: #fff; color: #000; }
    .bw-btn { width: 100%; background-color: #fff; color: #000; font-weight: bold; padding: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; border: 2px solid #fff; cursor: pointer; font-size: 1rem; }
    .bw-btn:hover { background-color: #000; color: #fff; }


    #vtt-interface { position: fixed; inset: 0; display: flex; flex-direction: column; overflow: hidden; z-index: 10; }
    canvas { touch-action: none; -webkit-user-select: none; user-select: none; }
    #vtt-canvas { flex: 1; min-height: 0; position: relative; width: 100%; background-color: #000; cursor: grab; display: block; }
    #vtt-canvas.plotting { cursor: crosshair !important; }


    .dice-history-ticker, .video-ribbon { flex-shrink: 0; }


    .toolbar { position: absolute; background: #000; border: 2px solid #fff; padding: 0.5rem; display: flex; flex-direction: column; gap: 0.35rem; z-index: 10; }
    #toolbar-left { top: 4rem; left: 1rem; box-shadow: 4px 4px 0px 0px #fff; width: 110px; }
    #toolbar-right { top: 4rem; right: 1rem; box-shadow: 4px 4px 0px 0px #fff; width: 180px; }


    .panel-label { font-size: 10px; text-align: center; border-bottom: 1px solid #fff; padding-bottom: 2px; text-transform: uppercase; color: #888; letter-spacing: 0.05em; cursor: move; padding-top: 2px; background: #111; margin: -0.5rem -0.5rem 0.2rem -0.5rem; }
    .panel-label:active { background: #fff; color: #000; }


    .tool-btn { background: #000; color: #fff; border: 1px solid #fff; padding: 0.25rem; font-size: 11px; text-transform: uppercase; cursor: pointer; font-weight: bold; width: 100%; text-align: center; display: block; margin-bottom: 4px; transition: all 0.2s ease; }
    .tool-btn:hover { background: #fff; color: #000; }
    .grid-dice { display: grid; grid-template-columns: 1fr 1fr; gap: 0.25rem; }


    #ctx-menu { position: absolute; display: none; background: #000; border: 2px solid #fff; box-shadow: 4px 4px 0px 0px #fff; padding: 2px; z-index: 100; min-width: 150px; }
    .ctx-item { background: #000; color: #fff; border: none; padding: 6px 8px; font-size: 11px; font-weight: bold; text-transform: uppercase; text-align: left; width: 100%; display: block; cursor: pointer; }
    .ctx-item:hover { background: #fff; color: #000; }


    #torch-panel { top: 4rem; left: 40%; width: 240px; box-shadow: 4px 4px 0px 0px #fff; z-index: 60; }
    #turn-tracker-panel { top: 4rem; right: 15rem; width: 300px; box-shadow: 4px 4px 0px 0px #fff; z-index: 60; }
    #fog-panel { top: 15rem; right: 1rem; width: 180px; box-shadow: 4px 4px 0px 0px #fff; z-index: 60; }


    .torch-controls { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-top: 10px; }
    .torch-status { font-size: 14px; font-weight: bold; padding: 2px 6px; color: #666; cursor: pointer; text-transform: uppercase; transition: color 0.2s ease; }
    .torch-status:hover { color: #aaa; }
    .torch-status.active { color: #fff; background: transparent; cursor: default; }
    #torch-clock { font-size: 1.5rem; font-weight: bold; color: #fff; letter-spacing: 0.05em; text-align: center; flex: 1; }


    .tracker-wrapper { display: flex; align-items: flex-end; justify-content: center; gap: 0; margin-top: 15px; margin-bottom: 5px; }
    .turn-col { display: flex; flex-direction: column; align-items: center; position: relative; }
    .turn-lbl { font-size: 11px; font-weight: bold; height: 16px; text-transform: uppercase; color: #ccc; }
    .turn-box { width: 32px; height: 32px; border: 2px solid #fff; border-right: none; background: #000; cursor: pointer; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 20px; }
    .turn-col:last-of-type .turn-box { border-right: 2px solid #fff; }
    .turn-box.checked::after { content: 'X'; color: #fff; }
    .turn-reset-btn { background: transparent; border: none; color: #fff; font-size: 22px; cursor: pointer; margin-left: 14px; padding-bottom: 4px; font-weight: bold; }
    .turn-reset-btn:hover { color: #888; }
    #turn-message { margin-top: 10px; font-size: 10px; text-align: center; color: #fff; text-transform: uppercase; min-height: 40px; line-height: 1.4; font-weight: bold; }


    .dice-history-ticker { width: 100%; height: 35px; background: #000; border-top: 2px solid #fff; display: flex; align-items: center; justify-content: flex-start; padding: 0 1rem; font-size: 12px; font-weight: bold; overflow-x: auto; white-space: nowrap; gap: 1.5rem; z-index: 20; }
    .ticker-entry { color: #fff; text-transform: uppercase; border-right: 1px dashed #333; padding-right: 1.5rem; display: inline-block; }
    .ticker-entry span { color: #888; margin-right: 4px; }


    .video-ribbon { width: 100%; background: #000; border-top: 2px solid #fff; padding: 0.5rem; display: flex; gap: 0.5rem; overflow-x: auto; height: 140px; align-items: center; justify-content: center; z-index: 20; }
    .video-box { position: relative; height: 110px; aspect-ratio: 16/9; background: #111; border: 1px solid #fff; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 0; }
    .video-box video { aspect-ratio: 16 / 9; width: 100%; height: 100%; object-fit: contain; background: #111; transform: scaleX(-1); -webkit-transform: scaleX(-1); -moz-transform: scaleX(-1); }
    .video-label { position: absolute; bottom: 4px; left: 4px; background: #000; color: #fff; font-size: 10px; padding: 2px 4px; border: 1px solid #fff; text-transform: uppercase; z-index: 5; }
    .video-controls-overlay { position: absolute; top: 4px; right: 4px; display: flex; gap: 2px; z-index: 5; opacity: 0.4; transition: opacity 0.2s ease; }
    .video-box:hover .video-controls-overlay { opacity: 1; }
    .media-toggle-btn { background: #000; color: #fff; border: 1px solid #fff; font-size: 8px; font-weight: bold; padding: 2px 4px; cursor: pointer; text-transform: uppercase; }
    .media-toggle-btn.muted-state { background: #ff3333; color: #fff; border-color: #ff3333; }
    .hardware-fail-alert { text-align: center; color: #666; font-size: 9px; padding: 10px; text-transform: uppercase; line-height: 1.3; font-weight: bold; }


    .dice-container-overlay { position: absolute; width: 120px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; pointer-events: none; z-index: 40; text-align: center; transition: opacity 0.5s ease-in-out; }
    .dice-sprite-frame { width: 100px; height: 100px; background-repeat: no-repeat; background-size: 700px 100px; background-position: 0px 0px; display: flex; align-items: center; justify-content: center; position: relative; }
    .dice-numerical-overlay { font-size: 24px; font-weight: bold; color: #fff; text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000; display: none; z-index: 2; }
    .dice-player-label { margin-top: 4px; background-color: #000; color: #fff; border: 1px solid #fff; font-size: 11px; padding: 2px 6px; text-transform: uppercase; letter-spacing: 0.05em; box-shadow: 2px 2px 0px 0px #fff; white-space: nowrap; }


    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #fff; }
</style>
</head>

<nav id="top-nav">

    <a href="merch.html" class="nav-link">MERCH</a>
    <a href="faq.html" class="nav-link">FAQ</a>

</nav>


<div id="login-screen">
    <div class="login-center-stack">
        <div class="logo-container">
            <img src="assets/dungeons85logo.svg" alt="Dungeons '85 Logo">
        </div>
        <div class="login-wrap">
            <div class="login-title">VERSION 7.1.1</div>
            <div class="toggle-container">
                <button type="button" id="role-player" class="toggle-btn active" onclick="setRoleSelection(false); document.getElementById('room-id-input').value = '';">PLAYER (JOIN)</button>
                <button type="button" id="role-dm" class="toggle-btn" onclick="setRoleSelection(true); generateRandomRoomName();">GM (HOST)</button>
            </div>
            <input type="text" id="char-name-input" placeholder="Character Name" class="bw-input" maxlength="20">
            <input type="text" id="room-id-input" placeholder="Room Name" class="bw-input" maxlength="20">
            <button id="join-btn" class="bw-btn">CREATE/JOIN TABLE</button>
        </div>
    </div>
</div>


<div id="vtt-interface" class="hidden">
    <canvas id="vtt-canvas"></canvas>


    <div id="ctx-menu">
        <button class="ctx-item" onclick="executeContextReveal()">Reveal/Hide</button>
        <button class="ctx-item" onclick="executeContextDuplicate()">Duplicate</button>
        <hr style="border: 0; border-top: 1px solid #222; margin: 4px 0;">
        <button class="ctx-item" onclick="executeContextResize(100)">Size: Med/Small (1x1)</button>
        <button class="ctx-item" onclick="executeContextResize(200)">Size: Large (2x2)</button>
        <button class="ctx-item" onclick="executeContextResize(300)">Size: Huge (3x3)</button>
        <button class="ctx-item" onclick="executeContextResize(400)">Size: Gargantuan (4x4)</button>
        <hr style="border: 0; border-top: 1px solid #222; margin: 4px 0;">
        <button class="ctx-item" onclick="executeContextDelete()" style="color: #ff3333;">Dead</button>
    </div>


    <div class="toolbar" id="toolbar-left">
        <div class="panel-label">:: Dice ::</div>
        <div class="grid-dice">
            <button onclick="rollDice(4)" class="tool-btn">D4</button>
            <button onclick="rollDice(6)" class="tool-btn">D6</button>
            <button onclick="rollDice(8)" class="tool-btn">D8</button>
            <button onclick="rollDice(10)" class="tool-btn">D10</button>
            <button onclick="rollDice(12)" class="tool-btn">D12</button>
            <button onclick="rollDice(20)" class="tool-btn">D20</button>
        </div>
    </div>


    <div class="toolbar" id="toolbar-right">
        <div class="panel-label">:: Tools ::</div>
        <button onclick="selectLocalFile('MAP')" class="tool-btn">Load Map</button>
	<button onclick="selectLocalFile('TOKEN')" class="tool-btn">Spawn Token</button>
        <button onclick="toggleTorchPanel()" class="tool-btn">Torch Timer</button>
        <button onclick="toggleTurnTracker()" class="tool-btn">Turn Tracker</button>
        <button onclick="toggleFogPanel()" class="tool-btn">Fog of War</button>
        <button onclick="forcePlayerFocus()" class="tool-btn>Focus View</button>


        <div style="border-top: 1px dashed #444; margin: 4px 0;"></div>


        <label class="tool-btn" style="cursor: pointer;">
            Import JSON
            <input type="file" accept=".json" style="display: none;" onchange="importAdventureJson(event)">
        </label>


        <button onclick="exportTableState()" class="tool-btn">Export JSON</button>
        <div style="font-size: 9px; text-align: center; text-transform: uppercase; color: #fff; background: #222; padding: 4px;" id="room-display">Room: ---</div>
    </div>


    <div class="toolbar hidden" id="fog-panel">
        <div class="panel-label">:: Fog Of War ::</div>
        <button onclick="toggleFogMode()" id="btn-fog-toggle" class="tool-btn">Enable Fog</button>
        <button onclick="toggleFogDraw()" id="btn-fog-draw" class="tool-btn" style="display:none;">PLOT REVEAL</button>
        <button onclick="resetFog()" id="btn-fog-reset" class="tool-btn" style="display:none; color: #ff3333;">Reset Fog</button>
        <div style="border-top: 1px dashed #444; margin: 4px 0;"></div>
        <button onclick="toggleDarknessManual()" id="btn-darkness-toggle" class="tool-btn">Force Darkness</button>
    </div>


    <div class="toolbar hidden" id="torch-panel">
        <div class="panel-label">:: Torch ::</div>
        <div class="torch-controls">
            <div id="torch-light-btn" class="torch-status" onclick="igniteTorch()">LIGHT</div>
            <div id="torch-clock">00:00</div>
            <div id="torch-dark-status" class="torch-status active" onclick="torchSeconds = 0; extinguishTorch()">DARK</div>
        </div>
    </div>


    <div class="toolbar hidden" id="turn-tracker-panel">
        <div class="panel-label">:: Turn Tracker ::</div>
        <div class="tracker-wrapper">
            <div class="turn-col">
                <div class="turn-lbl"></div>
                <div class="turn-box" id="turn-box-1" onclick="checkTurn(1)"></div>
            </div>
            <div class="turn-col">
                <div class="turn-lbl">W</div>
                <div class="turn-box" id="turn-box-2" onclick="checkTurn(2)"></div>
            </div>
            <div class="turn-col">
                <div class="turn-lbl"></div>
                <div class="turn-box" id="turn-box-3" onclick="checkTurn(3)"></div>
            </div>
            <div class="turn-col">
                <div class="turn-lbl">W</div>
                <div class="turn-box" id="turn-box-4" onclick="checkTurn(4)"></div>
            </div>
            <div class="turn-col">
                <div class="turn-lbl"></div>
                <div class="turn-box" id="turn-box-5" onclick="checkTurn(5)"></div>
            </div>
            <div class="turn-col">
                <div class="turn-lbl">WR</div>
                <div class="turn-box" id="turn-box-6" onclick="checkTurn(6)"></div>
                <div style="position: absolute; right: -12px; bottom: 8px; font-size: 12px; font-weight: bold;">T</div>
            </div>
            <button class="turn-reset-btn" onclick="resetTurns()">&#x21BA;</button> 
        </div>
        <div id="turn-message"></div>
    </div>


    <div id="ticker-log" class="dice-history-ticker">
        <div class="ticker-entry" id="ticker-empty-msg" style="color: #444; border: none;">[ Log Empty ]</div>
    </div>


    <div class="video-ribbon">
        <div class="video-box" id="local-video-container">
            <video id="local-video" autoplay muted playsinline></video>
            <div id="local-name" class="video-label">You</div>
            <div class="video-controls-overlay">
                <button id="toggle-mic-btn" class="media-toggle-btn" onclick="toggleLocalAudio()">Mute</button>
                <button id="toggle-cam-btn" class="media-toggle-btn" onclick="toggleLocalVideo()">Cam Off</button>
            </div>
        </div>
        <div id="peer-videos-container" class="flex" style="gap: 0.5rem;"></div>
    </div>
</div>


<script>
let tableState = { playerName: '', isDM: false, mapSrc: null, tokens: [], camera: { x: 0, y: 0, zoom: 1 }, fowEnabled: false, fowPolygons: [], isDarknessActive: false };
    let tokenImageCache = {}, socket = null, peer = null, localStream = null, currentActiveRoomArray = [];
    
    function showLoading(msg = "RECONSTRUCTING DUNGEON...") {
        document.getElementById('loading-msg').innerText = msg;
        document.getElementById('loading-overlay').style.display = 'flex';
    }
    function hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }

    // Replaces openCloudVault/Google Picker
    function selectLocalFile(mode) {
        if (!tableState.isDM) return;
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            showLoading("PROCESSING ASSET...");
            const reader = new FileReader();
            reader.onload = (event) => {
                const dataUrl = event.target.result;
                if (mode === 'MAP') {
                    tableState.mapSrc = dataUrl;
                    if (socket) socket.emit('updateMapImage', dataUrl);
                } else {
                    tableState.tokens.push({ id: "token-" + Date.now(), src: dataUrl, x: 0, y: 0, size: 100, hidden: true });
                    broadcastTokensMatrixChange();
                }
                loadCloudImage(dataUrl).then(() => { hideLoading(); draw(); });
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }
    
    const adjectives = ["Gravel", "Iron", "Obsidian", "Silent", "Bitter", "Deep", "Lost", "Fallen", "Corpse", "Broken"];
    const nouns = ["Crypt", "Spawning", "Vault", "Temple", "Bloom", "Pit", "Crawl", "Keep", "Void", "Borg"];


    function generateRandomRoomName() {
        if (!tableState.isDM) return;
        const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
        const noun = nouns[Math.floor(Math.random() * nouns.length)];
        const num = Math.floor(100 + Math.random() * 900); 
        const roomName = `${adj}${noun}${num}`.toUpperCase();
        document.getElementById('room-id-input').value = roomName;
    }

            }
    }


    let tableState = {
        playerName: '',
        isDM: false,
        mapSrc: null,
        tokens: [],
        camera: { x: 0, y: 0, zoom: 1 },
        fowEnabled: false,
        fowPolygons: [],
        isDarknessActive: false
    };


    let isDrawingFoW = false;
    let currentFoWPolygon = [];
    let currentMouseWorldX = 0;
    let currentMouseWorldY = 0;


    let tokenImageCache = {};
    let socket = null;
    let peer = null;
    let localStream = null;
    let currentActiveRoomArray = [];


    const canvas = document.getElementById('vtt-canvas');
    const ctx = canvas.getContext('2d');
    const ctxMenu = document.getElementById('ctx-menu');
    let contextSelectedToken = null;


    const fogCanvas = document.createElement('canvas');
    const fogCtx = fogCanvas.getContext('2d');


    window.addEventListener('DOMContentLoaded', () => {
        window.addEventListener('click', () => { ctxMenu.style.display = 'none'; });
        window.addEventListener('beforeunload', () => { if (socket) { socket.emit('disconnect'); socket.disconnect(); } });
    });


    function loadCloudImage(src) {
        if (!src) return Promise.resolve(null);
        if (tokenImageCache[src]) return Promise.resolve(tokenImageCache[src]);
        return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => { tokenImageCache[src] = img; resolve(img); };
            img.onerror = () => resolve(null);
            img.src = src;
        });
    }


    function setRoleSelection(isDMSelection) {
        tableState.isDM = isDMSelection;
        document.getElementById('role-dm').classList.toggle('active', isDMSelection);
        document.getElementById('role-player').classList.toggle('active', !isDMSelection);
    }


    function resizeCanvas() {
        canvas.width = canvas.clientWidth; 
        canvas.height = canvas.clientHeight; 


        fogCanvas.width = canvas.width;
        fogCanvas.height = canvas.height;


        draw();
    }
    window.addEventListener('resize', resizeCanvas);


    document.getElementById('join-btn').addEventListener('click', () => {
        const nameInput = document.getElementById('char-name-input').value.trim();
        const roomInput = document.getElementById('room-id-input').value.trim().toUpperCase();
        if (!nameInput || !roomInput) {
            alert("Please enter both a Character Name and a Room Name.");
            return;
        }
        tableState.playerName = nameInput;
        setupCameraAndVideo().then(() => {
            initHybridMediaVttStack(roomInput, nameInput);
        });
    });


    function forcePlayerFocus() {
        if (!tableState.isDM || !socket) return;
        socket.emit('forceCamera', tableState.camera);
        addResultToHistoryTicker("[SYS]", 0, "GM FORCED CAMERA FOCUS");
    }


    function toggleLocalAudio() {
        if (!localStream) return;
        const track = localStream.getAudioTracks()[0];
        if (track) {
            track.enabled = !track.enabled;
            const btn = document.getElementById('toggle-mic-btn');
            btn.innerText = track.enabled ? "Mute" : "Unmute";
            btn.classList.toggle('muted-state', !track.enabled);
        }
    }


    function toggleLocalVideo() {
        if (!localStream) return;
        const track = localStream.getVideoTracks()[0];
        if (track) {
            track.enabled = !track.enabled;
            const btn = document.getElementById('toggle-cam-btn');
            btn.innerText = track.enabled ? "Cam Off" : "Cam On";
            btn.classList.toggle('muted-state', !track.enabled);
        }
    }


    function initHybridMediaVttStack(roomName, playerName) {
        if (socket) socket.disconnect();


        const webrtcIceConfig = { config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } };
        peer = new Peer(undefined, webrtcIceConfig);
        peer.on('disconnected', () => { peer.reconnect(); });
        peer.on('open', (peerId) => {
            socket = io("https://newvtt.onrender.com", { transports: ["websocket"] });


            socket.on('joinError', (message) => {
                alert(message);
                window.location.reload(); 
            });


            socket.on('connect', () => {
                document.getElementById('room-display').innerText = `Room: ${roomName}`;
                document.getElementById('top-nav').classList.add('hidden'); 
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('vtt-interface').classList.remove('hidden');


                const emptyMsg = document.getElementById('ticker-empty-msg');
                if (emptyMsg) emptyMsg.remove();


                setTimeout(() => {
                    const entryMessage = tableState.isDM 
                        ? `${tableState.playerName} HAS CREATED THE TABLE` 
                        : `${tableState.playerName} HAS JOINED THE TABLE`;


                    socket.emit('playerNotification', entryMessage);
                }, 500);


               if (!tableState.isDM) {
                    const dmToolbar = document.getElementById('toolbar-right');
                    if (dmToolbar) dmToolbar.remove();
                }


                setTimeout(() => {
                    resizeCanvas();
                    makeElementsDraggable();
                }, 50);


                socket.emit('joinRoom', { roomName, playerName, isDM: tableState.isDM, peerId });
            });


            socket.on('updatePlayerList', (playersArray) => {
                currentActiveRoomArray.forEach(cachedPeer => {
                    const staysConnected = playersArray.some(p => p.peerId === cachedPeer.peerId);
                    if (!staysConnected) {
                        const deadBox = document.getElementById(`video-${cachedPeer.peerId}`);
                        if (deadBox) deadBox.remove();
                    }
                });
                currentActiveRoomArray = playersArray;
                playersArray.forEach(p => {
                    if (p.peerId !== peerId && localStream && !document.getElementById(`video-${p.peerId}`)) {
                        if (peerId > p.peerId) {
                            const call = peer.call(p.peerId, localStream);
                            call.on('stream', (remoteStream) => { addVideoFeed(remoteStream, p.peerId, p.name); });
                        }
                    }
                });
            });


            socket.on('syncMap', (mapSrc) => {
                tableState.mapSrc = mapSrc;
                loadCloudImage(mapSrc).then(() => draw());
            });


            socket.on('syncTokens', (incomingTokens) => {
                tableState.tokens = incomingTokens; 
                incomingTokens.forEach(t => loadCloudImage(t.src).then(() => draw()));
                draw();
            });


            socket.on('tokenMoved', (data) => {
                const match = tableState.tokens.find(t => t.id === data.id);
                if (match) { match.x = data.x; match.y = data.y; draw(); }
            });


            socket.on('diceRolledAnimation', (data) => {
                executeDiceOverlayAnimation(data.sides, data.result, data.player, data.screenX, data.screenY);
            });


            socket.on('playerNotification', (msg) => { 
                addResultToHistoryTicker("[SYS]", 0, msg); 
            });


            socket.on('syncCamera', (cameraData) => {
                if (tableState.isDM) return; 
                tableState.camera.x = cameraData.x;
                tableState.camera.y = cameraData.y;
                tableState.camera.zoom = cameraData.zoom;
                draw();
                addResultToHistoryTicker("[SYS]", 0, "VIEW FOCUSED BY GM");
            });


            socket.on('syncFoW', (fowData) => {
                tableState.fowEnabled = fowData.enabled;
                tableState.fowPolygons = fowData.polygons;
                if (fowData.darkness !== undefined) {
                    tableState.isDarknessActive = fowData.darkness;
                }
                if (tableState.isDM) updateFogUI();
                draw();
            });


        }); 


        peer.on('call', (call) => {
            call.answer(localStream);
            call.on('stream', (remoteStream) => {
                const identity = currentActiveRoomArray.find(p => p.peerId === call.peer);
                addVideoFeed(remoteStream, call.peer, identity ? identity.name : "Player Connected");
            });
        });
    }

    function importAdventureJson(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                tableState.tokens = json.tokens || [];
                tableState.mapSrc = json.savedMapSrc || null;


                tableState.fowEnabled = json.fowEnabled || false;
                tableState.fowPolygons = json.fowPolygons || [];
                tableState.isDarknessActive = json.isDarknessActive || false;


                if (tableState.mapSrc) {
                    socket.emit('updateMapImage', tableState.mapSrc);
                    loadCloudImage(tableState.mapSrc).then(() => draw());
                }
                broadcastTokensMatrixChange();


                if (tableState.isDM) {
                    updateFogUI();
                    broadcastFoW();
                }


                tableState.tokens.forEach(t => loadCloudImage(t.src).then(() => draw()));
                draw();
            } catch (err) { alert("JSON Parse Error."); }
        };
        reader.readAsText(file);
    }

    let isDraggingWorkspace = false;
    let dragStart = { x: 0, y: 0 };
    let selectedToken = null;


    canvas.addEventListener('contextmenu', (e) => {
        if (!tableState.isDM) return; 
        e.preventDefault();


        if (isDrawingFoW) {
            currentFoWPolygon = [];
            isDrawingFoW = false;
            updateFogUI();
            draw();
            return;
        }


        const rect = canvas.getBoundingClientRect();
        const worldX = (e.clientX - rect.left - tableState.camera.x) / tableState.camera.zoom;
        const worldY = (e.clientY - rect.top - tableState.camera.y) / tableState.camera.zoom;
        contextSelectedToken = null;
        for (let i = tableState.tokens.length - 1; i >= 0; i--) {
            const t = tableState.tokens[i];
            if (Math.hypot(t.x - worldX, t.y - worldY) < t.size / 2) { contextSelectedToken = t; break; }
        }
        if (contextSelectedToken) {
            ctxMenu.style.left = `${e.clientX}px`; ctxMenu.style.top = `${e.clientY}px`; ctxMenu.style.display = 'block';
        }
    });


    canvas.addEventListener('mousedown', (e) => {
        if (e.button === 2) return; 
        ctxMenu.style.display = 'none';
        const rect = canvas.getBoundingClientRect();
        const worldX = (e.clientX - rect.left - tableState.camera.x) / tableState.camera.zoom;
        const worldY = (e.clientY - rect.top - tableState.camera.y) / tableState.camera.zoom;


        if (tableState.isDM && isDrawingFoW && e.button === 0) {
            const dist = currentFoWPolygon.length > 0 ? Math.hypot(currentFoWPolygon[0].x - worldX, currentFoWPolygon[0].y - worldY) : Infinity;


            if (currentFoWPolygon.length > 2 && dist < (20 / tableState.camera.zoom)) {
                tableState.fowPolygons.push([...currentFoWPolygon]);
                currentFoWPolygon = [];
                isDrawingFoW = false;
                updateFogUI();
                broadcastFoW();
            } else {
                currentFoWPolygon.push({x: worldX, y: worldY});
            }
            draw();
            return; 
        }


        selectedToken = null;
        for (let i = tableState.tokens.length - 1; i >= 0; i--) {
            const t = tableState.tokens[i];
            if (!tableState.isDM && t.hidden) continue;
            if (Math.hypot(t.x - worldX, t.y - worldY) < t.size / 2) {
                selectedToken = t; 
                break; 
            }
        }
        isDraggingWorkspace = !selectedToken; 
        dragStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    });


    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left; 
        const mouseY = e.clientY - rect.top;


        currentMouseWorldX = (mouseX - tableState.camera.x) / tableState.camera.zoom;
        currentMouseWorldY = (mouseY - tableState.camera.y) / tableState.camera.zoom;


        if (tableState.isDM && isDrawingFoW && currentFoWPolygon.length > 0) {
            draw(); 
        }


        if (!isDraggingWorkspace && !selectedToken) return;


        const dx = (mouseX - dragStart.x) / tableState.camera.zoom;
        const dy = (mouseY - dragStart.y) / tableState.camera.zoom;


        if (selectedToken) {
            selectedToken.x += dx;
            selectedToken.y += dy;
            socket.emit('tokenMove', { id: selectedToken.id, x: selectedToken.x, y: selectedToken.y });
        } else if (isDraggingWorkspace) {
            tableState.camera.x += (mouseX - dragStart.x);
            tableState.camera.y += (mouseY - dragStart.y);
        }
        dragStart = { x: mouseX, y: mouseY }; 
        draw();
    });


    window.addEventListener('mouseup', () => {
        if (isDraggingWorkspace && selectedToken) broadcastTokensMatrixChange();
        isDraggingWorkspace = false; selectedToken = null;
    });


    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (e.deltaY < 0) tableState.camera.zoom *= 1.1; else tableState.camera.zoom /= 1.1;
        draw();
    });

    function makeElementsDraggable() {

 async function draw() {
        ctx.fillStyle = '#000000'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save(); 
        ctx.translate(tableState.camera.x, tableState.camera.y); 
        ctx.scale(tableState.camera.zoom, tableState.camera.zoom);


        const viewLeft = -tableState.camera.x / tableState.camera.zoom;
        const viewRight = (canvas.width - tableState.camera.x) / tableState.camera.zoom;
        const viewTop = -tableState.camera.y / tableState.camera.zoom;
        const viewBottom = (canvas.height - tableState.camera.y) / tableState.camera.zoom;


        let mapImgAsset = tokenImageCache[tableState.mapSrc];
        if (mapImgAsset && mapImgAsset.complete) {
            ctx.drawImage(mapImgAsset, -mapImgAsset.width / 2, -mapImgAsset.height / 2);
        } else {
            ctx.strokeStyle = '#1c1c1c'; ctx.lineWidth = 1;
            const startX = Math.floor(viewLeft / 40) * 40;
            const endX = Math.ceil(viewRight / 40) * 40;
            const startY = Math.floor(viewTop / 40) * 40;
            const endY = Math.ceil(viewBottom / 40) * 40;


            ctx.beginPath();
            for (let i = startX; i <= endX; i += 40) { ctx.moveTo(i, startY); ctx.lineTo(i, endY); }
            for (let i = startY; i <= endY; i += 40) { ctx.moveTo(startX, i); ctx.lineTo(endX, i); }
            ctx.stroke();
        }


        for (let t of tableState.tokens) {
            if (t.hidden && !tableState.isDM) continue;
            if (t.x + t.size / 2 < viewLeft || t.x - t.size / 2 > viewRight || t.y + t.size / 2 < viewTop || t.y - t.size / 2 > viewBottom) {
                continue;
            }


            ctx.save();
            if (tableState.isDM && t.hidden) ctx.globalAlpha = 0.50;
            let imgAsset = tokenImageCache[t.src];
            if (imgAsset && imgAsset.complete) {
                ctx.drawImage(imgAsset, t.x - t.size / 2, t.y - t.size / 2, t.size, t.size);
            }
            ctx.restore();
        }


        if (tableState.fowEnabled) {
            fogCtx.globalCompositeOperation = 'source-over';
            fogCtx.clearRect(0, 0, fogCanvas.width, fogCanvas.height);
            fogCtx.fillStyle = tableState.isDM ? 'rgba(0, 0, 0, 0.65)' : '#000000';
            fogCtx.fillRect(0, 0, fogCanvas.width, fogCanvas.height);


            fogCtx.save();
            fogCtx.translate(tableState.camera.x, tableState.camera.y);
            fogCtx.scale(tableState.camera.zoom, tableState.camera.zoom);
            fogCtx.globalCompositeOperation = 'destination-out';
            fogCtx.fillStyle = '#000'; 


            for (let poly of tableState.fowPolygons) {
                if (poly.length < 3) continue;
                fogCtx.beginPath();
                fogCtx.moveTo(poly[0].x, poly[0].y);
                for (let i = 1; i < poly.length; i++) {
                    fogCtx.lineTo(poly[i].x, poly[i].y);
                }
                fogCtx.closePath();
                fogCtx.fill(); 
            }
            fogCtx.restore();


            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0); 
            ctx.drawImage(fogCanvas, 0, 0);
            ctx.restore();
        }


        if (tableState.isDM && isDrawingFoW && currentFoWPolygon.length > 0) {
            ctx.save();
            ctx.strokeStyle = '#ff3333';
            ctx.lineWidth = 2 / tableState.camera.zoom;


            ctx.beginPath();
            ctx.moveTo(currentFoWPolygon[0].x, currentFoWPolygon[0].y);
            for (let i = 1; i < currentFoWPolygon.length; i++) {
                ctx.lineTo(currentFoWPolygon[i].x, currentFoWPolygon[i].y);
            }
            ctx.lineTo(currentMouseWorldX, currentMouseWorldY);
            ctx.stroke();


            ctx.fillStyle = '#ff3333';
            ctx.beginPath();
            ctx.arc(currentFoWPolygon[0].x, currentFoWPolygon[0].y, 6 / tableState.camera.zoom, 0, Math.PI * 2);
            ctx.fill();


            ctx.restore();
        }


        ctx.restore(); 


        if (tableState.isDarknessActive) {
            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0); 
            ctx.fillStyle = tableState.isDM ? 'rgba(0, 0, 0, 0.4)' : 'rgba(0, 0, 0, 0.95)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
        }
    }

    function executeDiceOverlayAnimation(sides, result, rollerName, posX, posY) {
        const interfaceWrapper = document.getElementById('vtt-interface');
        const container = document.createElement('div'); container.className = 'dice-container-overlay';
        container.style.left = `${posX}%`; container.style.top = `${posY}%`;
        const spriteFrame = document.createElement('div'); spriteFrame.className = 'dice-sprite-frame';
        spriteFrame.style.backgroundImage = `url('assets/dice/d${sides}.png')`;
        const numberOverlay = document.createElement('div'); numberOverlay.className = 'dice-numerical-overlay';
        numberOverlay.innerText = result;
        const labelCard = document.createElement('div'); labelCard.className = 'dice-player-label';
        labelCard.innerText = rollerName;
        spriteFrame.appendChild(numberOverlay); container.appendChild(spriteFrame);
        container.appendChild(labelCard); interfaceWrapper.appendChild(container);
        let frameIdx = 0; const maxTumbleCycles = 12; let frameCounter = 0;
        const tumbleTimer = setInterval(() => {
            frameIdx = (frameIdx + 1) % 6; spriteFrame.style.backgroundPosition = `-${frameIdx * 100}px 0px`;
            frameCounter++;
            if (frameCounter >= maxTumbleCycles) {
                clearInterval(tumbleTimer); spriteFrame.style.backgroundPosition = `-600px 0px`;
                numberOverlay.style.display = 'block'; addResultToHistoryTicker(rollerName, sides, result);
                setTimeout(() => { container.style.opacity = '0'; setTimeout(() => container.remove(), 500); }, 5000);
            }
        }, 75);
    }


    function addResultToHistoryTicker(player, sides, result) {
        const ticker = document.getElementById('ticker-log');
        const emptyMsg = document.getElementById('ticker-empty-msg');
        if (emptyMsg) emptyMsg.remove();
        const logEntry = document.createElement('div'); logEntry.className = 'ticker-entry';
        logEntry.innerHTML = sides === 0 
            ? `<span>[SYS]</span> ${result}`
            : `<span>[${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'})}]</span> ${player} ROLLED D${sides}: ${result}`;
        ticker.appendChild(logEntry);
        ticker.scrollLeft = ticker.scrollWidth;
    }


    let torchInterval = null;
    let torchSeconds = 0;


    function toggleTorchPanel() {
        if (!tableState.isDM) return; 
        document.getElementById('torch-panel').classList.toggle('hidden');
    }


    function igniteTorch() {
        clearInterval(torchInterval);
        const randomDeduction = Math.floor(Math.random() * 301);
        torchSeconds = 3600 - randomDeduction;


        document.getElementById('torch-light-btn').classList.add('active');
        document.getElementById('torch-dark-status').classList.remove('active');
        updateTorchDisplay();


        if (tableState.isDarknessActive) {
            tableState.isDarknessActive = false;
            updateFogUI();
            broadcastFoW();
            draw();
            addResultToHistoryTicker("[SYS]", 0, "NEW TORCH IGNITED");
        }


        torchInterval = setInterval(() => {
            torchSeconds--;
            if (torchSeconds <= 0) {
                torchSeconds = 0;
                extinguishTorch();
            }
            updateTorchDisplay();
        }, 1000);
    }


    function extinguishTorch() {
        clearInterval(torchInterval);
        document.getElementById('torch-light-btn').classList.remove('active');
        document.getElementById('torch-dark-status').classList.add('active');
        updateTorchDisplay();


        if (!tableState.isDarknessActive) {
            tableState.isDarknessActive = true;
            updateFogUI();
            broadcastFoW();
            draw();
            addResultToHistoryTicker("[SYS]", 0, "TORCH EXPIRED: LIGHTS OUT");
        }
    }

async function setupCameraAndVideo() {
        const container = document.getElementById('local-video-container');
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: { ideal: 1280 }, height: { ideal: 720 }, aspectRatio: { ideal: 1.7777777778 } },
                audio: true
            });
            const localVideoEl = document.getElementById('local-video');
            if (localVideoEl) localVideoEl.srcObject = localStream;
            if (peer && peer.id) addVideoFeed(localStream, peer.id, tableState.playerName);
        } catch (err) {
            console.error("Camera failed:", err);
            const failAlert = document.createElement('div'); 
            failAlert.className = 'hardware-fail-alert';
            failAlert.innerText = "CAMERA BLOCKED OR NOT FOUND";
            container.insertBefore(failAlert, container.firstChild); 
            const vid = document.getElementById('local-video');
            if (vid) vid.remove();
        }
    }


    function addVideoFeed(stream, peerId, characterName) {
        const existingBox = document.getElementById(`video-${peerId}`);
        if (existingBox) return;
        const container = document.getElementById('peer-videos-container');
        const box = document.createElement('div'); 
        box.className = "video-box"; box.id = `video-${peerId}`;
        const videoEl = document.createElement('video'); 
        videoEl.srcObject = stream; videoEl.autoplay = true; videoEl.playsInline = true; videoEl.muted = false; 
        const label = document.createElement('div'); 
        label.className = "video-label"; label.id = `label-${peerId}`; 
        label.innerText = characterName || "Player Connected"; 
        box.appendChild(videoEl); box.appendChild(label); container.appendChild(box);
    }
    draw();
</script>
</body>
</html>
